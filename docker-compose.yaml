services:
  tracker-app:
    env_file:
      - .env
    build:
      context: .
      dockerfile: cmd/trackerapp/Dockerfile
    container_name: "main-app"
    ports:
      - "8080:8080"
    depends_on:
      - data-base

  data-base:
    image: postgres:18.3-bookworm
    container_name: "DataBase"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: migrate-container
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations